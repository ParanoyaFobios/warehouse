{% for msg in chat_history %}
  <p class="chat__window-mess chat__window-mess--{% if msg.sender == request.user %}my{% else %}alien{% endif %}">
    {{ msg.content|linebreaksbr }}
    <span class="msg-time" style="font-size: 0.7em; opacity: 0.6;">{{ msg.timestamp|date:"H:i" }}</span>
    {% if msg.sender == request.user %}
      {% if msg.is_read %} ✓✓{% else %} ✓{% endif %}
    {% endif %}
  </p>
{% endfor %}

<script>
    // Прокрутка вниз при каждом обновлении списка сообщений
    var scroller = document.getElementById('messages-scroller');
    if (scroller) {
        scroller.scrollTop = scroller.scrollHeight;
    }
</script>
