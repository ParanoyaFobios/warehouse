    <form class="overlay-new-chat container" method="post" action="{% url 'new_message' %}">

              fill="#00A6F2"
            />
          </svg>
        </span>
      </h1>
      <ul class="overlay-new-chat-list">
          {% for user_choice in new_chat_form.fields.recipients.queryset %}
        <li class="overlay-new-chat-item">
          <div class="overlay-new-chat-user">
            <div class="overlay-new-chat-user-top-part">
              <label
              class="table-card-first__title-custom-checkbox custom-checkbox"
              >
                <input
                name="recipients" value="{{ user_choice.pk }}"
                type="checkbox"/>
                <span class="checkmark"></span>
              </label>
              <h2 class="overlay-new-chat-user-name">{{ user_choice.get_full_name|default:user_choice.username }}</h2>
            </div>
            <p
              class="table__td-color table__td-color--orange-trans60 width100"
            >
            {{ user_choice.groups.all.0.name|default:"Без группы" }}
            </p>
          </div>
        </li>
      {% endfor %}
      </ul>
      <div
        class="section__other-buttons-cont section__other-buttons-cont--without-borders section__other-buttons-cont--without-m-bottom"
      >
        <button type="button" onclick="this.closest('dialog').close()"
          class="section__other-buttons-cont-button section__other-buttons-cont-button--orange"
        >
          <span class="content-size">
            <svg
              width="30"
              height="30"
              viewBox="0 0 30 30"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect width="30" height="30" rx="3" fill="#F28500" />
              <path
                d="M15.944 24C15.8073 24 15.6706 23.9554 15.5612 23.862L5.24216 15.511C5.08983 15.3892 5 15.1985 5 14.9997C5 14.8008 5.08983 14.6101 5.24216 14.4884L15.5612 6.13733C15.7487 5.98313 16.0065 5.95879 16.2213 6.06429C16.4361 6.17385 16.5728 6.40109 16.5728 6.64862V12.2972H20.5137C21.7245 12.2972 22.7986 12.7273 23.611 13.5389C24.3336 14.2612 24.814 15.2594 24.9546 16.3428C25.0991 17.4303 24.896 18.53 24.3843 19.4349C23.8102 20.4494 22.8923 21.1636 21.7284 21.5004C21.5019 21.5653 21.2597 21.4922 21.0996 21.3137C20.9395 21.1352 20.8926 20.8755 20.9746 20.6442C21.2519 19.8813 21.5058 18.8628 21.1543 18.3312C20.877 17.9132 20.1817 17.7022 19.0842 17.7022H16.5689V23.3467C16.5689 23.5942 16.4322 23.8215 16.2174 23.931C16.1314 23.9797 16.0377 24 15.944 24Z"
                fill="white"
              />
            </svg>
          </span>
          <span>Отмена</span>
        </button>
      </div>
      <div class="overlay-new-chat-mess-cont">
        <textarea
            name="content"
          placeholder="Напишите сообщение..."
          class="chat__form-filefold form-textarea"
          rows="1"
          required
        ></textarea>
        <button type="submit" class="button button--orange width100">
          Отправить
        </button>
      </div>
    </form>
  </dialog>
